<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>勉強ナビ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0f1117;--ink2:#2d3142;--muted:#6b7280;--border:#e5e7eb;
  --bg:#f8f9fc;--white:#ffffff;
  --blue:#2563eb;--blue-l:#eff6ff;--blue-m:#bfdbfe;
  --green:#059669;--green-l:#d1fae5;
  --amber:#d97706;--amber-l:#fef3c7;
  --red:#dc2626;--red-l:#fee2e2;
  --purple:#7c3aed;--purple-l:#ede9fe;
}
body{font-family:'Noto Sans JP',sans-serif;color:var(--ink);background:var(--white);font-size:14px;line-height:1.6}

/* ── header ── */
.ph{border-bottom:2px solid var(--ink);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:50px;position:sticky;top:0;background:var(--white);z-index:100}
.ph-logo{font-size:16px;font-weight:900;letter-spacing:-0.03em}
.ph-logo span{color:var(--blue)}
.ph-tag{font-size:11px;color:var(--muted);border:1px solid var(--border);padding:2px 10px;border-radius:20px;margin-left:10px}
.ph-actions{display:flex;gap:8px;align-items:center}
.ph-btn{font-size:12px;padding:5px 14px;border-radius:6px;border:1.5px solid var(--border);cursor:pointer;background:var(--white);color:var(--ink);font-family:inherit;transition:all .15s}
.ph-btn:hover{border-color:var(--ink)}
.ph-btn.danger{border-color:var(--red-l);color:var(--red)}
.ph-btn.danger:hover{background:var(--red-l)}

/* ── tabs ── */
.tabs{display:flex;border-bottom:1.5px solid var(--border);padding:0 20px;background:var(--white)}
.tab{padding:10px 18px;font-size:13px;font-weight:700;cursor:pointer;border-bottom:2.5px solid transparent;margin-bottom:-1.5px;color:var(--muted);transition:all .15s}
.tab.active{color:var(--blue);border-color:var(--blue)}
.tab:hover:not(.active){color:var(--ink)}

/* ── views ── */
.view{display:none}.view.active{display:block}

/* ── LEARN view ── */
.learn-wrap{display:grid;grid-template-columns:22% 24% 24% 30%;height:calc(100vh - 102px)}
.pane{border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.pane:last-child{border-right:none}
.pane-hd{padding:8px 12px;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0}
.pane-tag{font-size:9px;font-weight:700;color:var(--blue);letter-spacing:.08em;margin-bottom:2px}
.pane-name{font-size:11px;font-weight:700;color:var(--ink)}
.pane-body{flex:1;overflow-y:auto;padding:8px}

/* P1 */
.qrow{padding:8px 10px;border-radius:8px;border:1.5px solid transparent;margin-bottom:4px;cursor:pointer;transition:all .15s}
.qrow:hover{background:var(--bg);border-color:var(--border)}
.qrow.active{background:var(--blue-l);border-color:var(--blue-m)}
.qrow-top{display:flex;align-items:center;gap:6px}
.qnum{font-size:10px;color:var(--muted);min-width:22px;font-family:'DM Mono',monospace}
.qtxt{font-size:11px;flex:1;line-height:1.4}
.qbdg{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;flex-shrink:0}
.bdg-A{background:var(--green-l);color:var(--green)}
.bdg-B{background:var(--amber-l);color:var(--amber)}
.bdg-C{background:var(--red-l);color:var(--red)}
.bdg-N{background:var(--bg);color:var(--muted);border:1px solid var(--border)}
.qprev{font-size:10px;color:var(--muted);margin-top:3px;padding-left:28px;line-height:1.4}

/* P2 */
.qtext{font-size:12px;line-height:1.7;padding:10px;background:var(--bg);border-radius:8px;margin-bottom:10px}
.ox-row{display:flex;gap:6px;margin-bottom:8px}
.ox-btn{flex:1;padding:10px;font-size:20px;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;background:var(--white);transition:all .15s}
.ox-btn:hover:not(:disabled){background:var(--bg)}
.ox-btn.sel-ok{border-color:var(--green);background:var(--green-l)}
.ox-btn.sel-ng{border-color:var(--red);background:var(--red-l)}
.ox-btn:disabled{cursor:default}
.ch-btn{width:100%;text-align:left;padding:7px 10px;border:1.5px solid var(--border);border-radius:7px;margin-bottom:5px;cursor:pointer;font-size:11px;font-family:'Noto Sans JP',sans-serif;color:var(--ink);background:var(--white);transition:all .15s}
.ch-btn:hover:not(:disabled){background:var(--bg)}
.ch-btn.sel{border-color:var(--blue);background:var(--blue-l)}
.ch-btn.ok{border-color:var(--green);background:var(--green-l)}
.ch-btn.ng{border-color:var(--red);background:var(--red-l)}
.ch-btn:disabled{cursor:default}
.dbtn{width:100%;padding:8px;border-radius:8px;border:1.5px solid var(--border);background:var(--white);font-size:11px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .15s;margin-top:6px}
.dbtn:hover:not(:disabled){background:var(--bg)}
.dbtn.primary{background:var(--blue);color:var(--white);border-color:var(--blue)}
.dbtn.primary:hover:not(:disabled){background:#1d4ed8}
.dbtn:disabled{opacity:.35;cursor:not-allowed}
.res-box{padding:8px 12px;border-radius:8px;font-size:12px;font-weight:700;margin-bottom:8px}
.res-ok{background:var(--green-l);color:var(--green)}
.res-ng{background:var(--red-l);color:var(--red)}
.explain-box{background:var(--bg);border-radius:8px;padding:9px;margin-bottom:8px}
.explain-lbl{font-size:9px;font-weight:700;color:var(--muted);margin-bottom:3px;letter-spacing:.08em}
.explain-txt{font-size:11px;line-height:1.6}

/* P3 */
.cause-item{display:flex;align-items:center;gap:8px;padding:7px 9px;border:1.5px solid var(--border);border-radius:8px;margin-bottom:5px;cursor:pointer;transition:all .15s}
.cause-item:hover{background:var(--bg)}
.cause-item.sel{border-color:var(--red);background:var(--red-l)}
.cause-ico{font-size:14px;width:22px;text-align:center;flex-shrink:0}
.cause-lbl{font-size:11px;font-weight:500}
.cause-sub{font-size:9px;color:var(--muted)}
.cause-item.sel .cause-lbl{color:var(--red)}
.slbl{font-size:9px;color:var(--muted);font-weight:700;letter-spacing:.08em;margin:8px 0 4px}
.memo-ta{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:7px;font-size:11px;font-family:'Noto Sans JP',sans-serif;color:var(--ink);background:var(--white);resize:none}
.memo-ta:focus{outline:none;border-color:var(--blue)}
.locked{display:flex;flex-direction:column;align-items:center;justify-content:center;height:140px;gap:6px;color:var(--muted);font-size:11px;text-align:center;padding:16px;line-height:1.6}
.lock-ico{font-size:22px;opacity:.4}
.hist-item{background:var(--bg);border-radius:7px;padding:7px 9px;margin-bottom:4px;font-size:10px}
.hist-date{color:var(--muted);margin-bottom:2px}

/* P4 */
.ai-box{background:var(--blue-l);border:1.5px solid var(--blue-m);border-radius:10px;padding:10px;margin-bottom:8px}
.ai-hd{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.ai-ico{width:22px;height:22px;background:var(--blue);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--white);font-weight:700;flex-shrink:0}
.ai-title{font-size:11px;font-weight:700;color:var(--blue)}
.ai-txt{font-size:11px;line-height:1.6}
.action-item{display:flex;align-items:flex-start;gap:7px;padding:7px 9px;border:1.5px solid var(--border);border-radius:8px;margin-bottom:5px;cursor:pointer;transition:all .15s}
.action-item.sel{border-color:var(--blue);background:var(--blue-l)}
.action-cb{width:14px;height:14px;border:1.5px solid var(--border);border-radius:3px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700}
.action-item.sel .action-cb{background:var(--blue);border-color:var(--blue);color:var(--white)}
.action-txt{font-size:11px;flex:1}
.action-when{font-size:9px;color:var(--muted);margin-top:2px}
.save-btn{width:100%;padding:9px;border-radius:8px;background:var(--green);color:var(--white);border:none;font-size:11px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;margin-top:8px;transition:background .15s}
.save-btn:hover{background:#047857}
.save-btn:disabled{background:var(--border);color:var(--muted);cursor:not-allowed}
.prog-row{display:flex;align-items:center;gap:8px;margin-top:4px}
.prog-bar{height:4px;background:var(--border);border-radius:2px;flex:1;max-width:160px}
.prog-fill{height:100%;background:var(--blue);border-radius:2px;transition:width .4s}
.prog-lbl{font-size:11px;color:var(--muted)}

/* ── HISTORY view ── */
.history-wrap{max-width:900px;margin:0 auto;padding:24px 20px}
.hist-title{font-size:20px;font-weight:900;letter-spacing:-.03em;margin-bottom:4px}
.hist-sub{font-size:13px;color:var(--muted);margin-bottom:20px}
.hist-table{width:100%;border-collapse:collapse}
.hist-table th{font-size:11px;font-weight:700;color:var(--muted);text-align:left;padding:8px 12px;border-bottom:2px solid var(--border)}
.hist-table td{padding:9px 12px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:top}
.hist-table tr:hover td{background:var(--bg)}
.empty-msg{text-align:center;padding:60px;color:var(--muted)}

/* ── STATS view ── */
.stats-wrap{max-width:900px;margin:0 auto;padding:24px 20px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat-card{border:1.5px solid var(--border);border-radius:12px;padding:16px}
.stat-num{font-size:28px;font-weight:900;letter-spacing:-.03em;margin-bottom:2px}
.stat-lbl{font-size:11px;color:var(--muted)}
.chart-wrap{border:1.5px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.chart-title{font-size:13px;font-weight:700;margin-bottom:14px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bar-lbl{font-size:11px;color:var(--muted);width:90px;flex-shrink:0;text-align:right}
.bar-bg{flex:1;height:20px;background:var(--bg);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .5s;min-width:4px}
.bar-val{font-size:11px;color:var(--muted);width:30px;text-align:right;font-family:'DM Mono',monospace}
.cause-colors{knowledge:var(--blue);understanding:var(--purple);skip:var(--amber);calc_:var(--green);careless:var(--red);time:var(--muted)}

/* DB panel */
.db-wrap{max-width:900px;margin:0 auto;padding:24px 20px}
.db-section{border:1.5px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px}
.db-section-title{font-size:13px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.db-tag{font-size:10px;font-weight:700;background:var(--blue-l);color:var(--blue);padding:2px 8px;border-radius:4px}
.db-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px}
.db-row:last-child{border-bottom:none}
.db-key{color:var(--muted);font-family:'DM Mono',monospace;font-size:11px}
.db-val{color:var(--ink);font-family:'DM Mono',monospace;font-size:11px;max-width:60%;word-break:break-all;text-align:right}
pre.json-view{background:var(--bg);border-radius:8px;padding:12px;font-size:10px;overflow-x:auto;font-family:'DM Mono',monospace;line-height:1.5;max-height:240px;overflow-y:auto}
.export-row{display:flex;gap:8px;margin-top:10px}
.export-btn{padding:6px 14px;border-radius:6px;border:1.5px solid var(--border);font-size:12px;cursor:pointer;font-family:inherit;background:var(--white);transition:all .15s}
.export-btn:hover{background:var(--bg)}
.import-area{margin-top:10px}
.import-ta{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:8px;font-size:11px;font-family:'DM Mono',monospace;resize:none;color:var(--ink);background:var(--white)}
.import-ta:focus{outline:none;border-color:var(--blue)}
</style>
</head>
<body>

<div class="ph">
  <div style="display:flex;align-items:center">
    <div class="ph-logo">勉強<span>ナビ</span></div>
    <div class="ph-tag">学習改善システム</div>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <div id="ph-prog" style="font-size:11px;color:var(--muted)"></div>
    <div class="ph-actions">
      <button class="ph-btn" onclick="exportData()">📤 エクスポート</button>
      <button class="ph-btn danger" onclick="confirmReset()">🗑 リセット</button>
    </div>
  </div>
</div>

<div class="tabs">
  <div class="tab active" id="tab-learn" onclick="showTab('learn')">📝 学習</div>
  <div class="tab" id="tab-history" onclick="showTab('history')">📋 履歴</div>
  <div class="tab" id="tab-stats" onclick="showTab('stats')">📊 統計</div>
  <div class="tab" id="tab-db" onclick="showTab('db')">🗄 DB確認</div>
</div>

<!-- LEARN -->
<div class="view active" id="view-learn">
<div class="learn-wrap">
  <!-- P1 -->
  <div class="pane">
    <div class="pane-hd">
      <div class="pane-tag">PANE 1</div>
      <div class="pane-name">問題一覧（復習優先）</div>
      <div class="prog-row">
        <div class="prog-bar"><div class="prog-fill" id="prog-fill"></div></div>
        <div class="prog-lbl" id="prog-lbl">0/7問</div>
      </div>
    </div>
    <div class="pane-body" id="p1"></div>
  </div>
  <!-- P2 -->
  <div class="pane">
    <div class="pane-hd">
      <div class="pane-tag">PANE 2</div>
      <div class="pane-name" id="p2-name">問題と解答</div>
    </div>
    <div class="pane-body" id="p2"><div class="locked"><div class="lock-ico">←</div>問題を選んでください</div></div>
  </div>
  <!-- P3 -->
  <div class="pane">
    <div class="pane-hd">
      <div class="pane-tag">PANE 3</div>
      <div class="pane-name">原因分析</div>
    </div>
    <div class="pane-body" id="p3"><div class="locked"><div class="lock-ico">🔒</div>解答後に入力できます</div></div>
  </div>
  <!-- P4 -->
  <div class="pane">
    <div class="pane-hd">
      <div class="pane-tag">PANE 4</div>
      <div class="pane-name">改善計画</div>
    </div>
    <div class="pane-body" id="p4"><div class="locked"><div class="lock-ico">🔒</div>原因を選択後に解放</div></div>
  </div>
</div>
</div>

<!-- HISTORY -->
<div class="view" id="view-history">
<div class="history-wrap">
  <div class="hist-title">学習履歴</div>
  <div class="hist-sub">保存されたすべての解答と改善計画の記録</div>
  <div id="hist-content"></div>
</div>
</div>

<!-- STATS -->
<div class="view" id="view-stats">
<div class="stats-wrap">
  <div class="hist-title" style="margin-bottom:4px">統計ダッシュボード</div>
  <div class="hist-sub" style="margin-bottom:20px">蓄積データから見えてきた学習傾向</div>
  <div class="stats-grid" id="stats-grid"></div>
  <div class="chart-wrap" id="cause-chart"></div>
  <div class="chart-wrap" id="score-chart"></div>
</div>
</div>

<!-- DB -->
<div class="view" id="view-db">
<div class="db-wrap">
  <div class="hist-title" style="margin-bottom:4px">データベース確認</div>
  <div class="hist-sub" style="margin-bottom:20px">localStorage に保存された生データを確認・操作できます</div>
  <div id="db-content"></div>
</div>
</div>

<script>
// ─────────────────────────────────────────
// データ定義
// ─────────────────────────────────────────
const QS = [
  {id:0,text:'「システム状態の視認性」とは、ユーザーに現在の状態を常に知らせることを意味する。',type:'ox',answer:true,explain:'適切なフィードバックを適切なタイミングで提供し、ユーザーが現在何が起きているか常に把握できるようにすることです。',point:'進行状況バー、ローディングスピナーなどが代表例。',principle:'第1原則：システム状態の視認性'},
  {id:1,text:'「エラー防止」の原則は「エラーメッセージ」の原則よりも優先度が低い。',type:'ox',answer:false,explain:'エラーを防ぐことはエラー後に対処することよりも重要です。エラー防止の方が優先度が高い。',point:'確認ダイアログ、制約付き入力などが代表例。',principle:'第5原則：エラー防止'},
  {id:2,text:'ユーザーの記憶負荷を最小化するために行うべきことはどれか？',type:'sel',choices:['すべての情報を一画面に表示する','オブジェクト・行動・選択肢を可視化する','テキストのみのインターフェースを使用する','ショートカットキーを廃止する'],answer:1,explain:'「認識対想起」の原則では、ユーザーが記憶するのではなく見て認識できるようにすることが重要です。',point:'ドロップダウン、アイコン、ツールチップが記憶負荷を下げる。',principle:'第6原則：認識対想起'},
  {id:3,text:'「柔軟性と効率性」において、初心者には見えない機能を上級者向けに提供することは適切である。',type:'ox',answer:true,explain:'アクセラレーターは上級者向けに提供し、両方のニーズに応えられます。',point:'キーボードショートカット、カスタマイズ機能などが代表例。',principle:'第7原則：柔軟性と効率性'},
  {id:4,text:'「一貫性と標準」においてメタファーが重要な理由はどれか？',type:'sel',choices:['デザインを美しく見せるため','現実世界の概念をUI操作に活用するため','システムの処理速度を上げるため','ユーザーのログインを簡単にするため'],answer:1,explain:'ユーザーが慣れ親しんだ概念を使うことで直感的な理解を促します。',point:'ゴミ箱、ショッピングカートなどが代表例。',principle:'第2原則：現実世界との一致'},
  {id:5,text:'「ユーザーの制御と自由」は、誤操作の際に簡単に元に戻せることを保証する。',type:'ox',answer:true,explain:'「緊急脱出口」を提供することでユーザーは安心して操作できます。',point:'Ctrl+Z、キャンセルボタンなどが重要な実装例。',principle:'第3原則：ユーザーの制御と自由'},
  {id:6,text:'「審美的で最小限のデザイン」において適切でない行為はどれか？',type:'sel',choices:['不要な情報を削除する','重要な情報を強調する','すべての機能を一画面に詰め込む','白いスペースを活用する'],answer:2,explain:'不要な情報はすべての関連情報を薄めます。優先順位を明確にすることが重要です。',point:'情報の優先順位付け、余白、視覚的階層が核心。',principle:'第8原則：審美的で最小限のデザイン'},
];

const CAUSES = [
  {id:'knowledge',label:'知識不足',sub:'必要な知識を知らなかった',ico:'📚'},
  {id:'understanding',label:'理解不足',sub:'知識はあるが理解が不十分',ico:'💡'},
  {id:'skip',label:'読み飛ばし',sub:'問題文を正確に読んでいない',ico:'👁'},
  {id:'calc',label:'計算ミス',sub:'計算過程でミスした',ico:'🔢'},
  {id:'careless',label:'勘違い・思い込み',sub:'思い込みや勘違いをしていた',ico:'🤔'},
  {id:'time',label:'ケアレスミス',sub:'注意不足によるミス',ico:'⚡'},
];

const PROPOSALS = {
  knowledge:{C:'「{p}」の基礎から学び直してください。まず用語カードで定義を確認し、教科書の該当箇所を精読しましょう。',B:'「{p}」の知識に抜けがあります。類似問題を3問解いて定着を確認してください。',A:'知識の細部に不安があります。用語の定義を声に出して説明できるか確認してみてください。'},
  understanding:{C:'「{p}」の概念の理解が不十分です。具体例を3つ自分で考え説明してみましょう。',B:'概念は知っているが深さが足りません。「なぜそうなるか」を自分の言葉で説明する練習をしてください。',A:'理解の応用力を高める必要があります。実際のUIを見て原則を当てはめる練習が効果的です。'},
  skip:{C:'問題文のキーワードに下線を引き、選択肢を読む前に自分の答えを先に考える習慣をつけてください。',B:'問題文の重要語句を意識して読む練習が必要です。',A:'急がず問題文を2回読む習慣をつけましょう。'},
  calc:{C:'計算や論理展開の過程を書き出す習慣をつけてください。',B:'計算ステップを丁寧に確認しましょう。解答後に検算する習慣をつけてください。',A:'引き続き計算過程を書き出す習慣を続けてください。'},
  careless:{C:'選択肢を全部読んでから選ぶ。「本当にそうか？」と自問する習慣をつけてください。',B:'直感で答えを決めていませんか？根拠を確認してから解答する癖をつけましょう。',A:'答えの根拠を1文で説明できるか確認してみてください。'},
  time:{C:'問題を解くときは一問一問に集中し、焦らず確認する習慣をつけてください。',B:'解答前に一度立ち止まる「確認の間」を意識してください。',A:'最後の見直しを欠かさない習慣を続けましょう。'},
};

const ACTIONS = {
  knowledge:[{txt:'用語カードで定義を確認する',when:'今日'},{txt:'教科書の該当箇所を精読する',when:'明日'},{txt:'類似問題を3問解いて定着確認',when:'次回から'}],
  understanding:[{txt:'具体例を3つ自分で考えてみる',when:'今日'},{txt:'「なぜそうなるか」を声に出して説明する',when:'明日'},{txt:'実際のUIで原則を当てはめる練習',when:'今週中'}],
  skip:[{txt:'問題文のキーワードに下線を引く',when:'次回から'},{txt:'選択肢を読む前に答えを先に考える',when:'今回から'},{txt:'問題文を2回読んでから解答する',when:'今回から'}],
  calc:[{txt:'計算過程をすべて書き出す',when:'今回から'},{txt:'解答後に検算する',when:'今回から'},{txt:'間違えたステップを特定してメモ',when:'次回から'}],
  careless:[{txt:'選択肢を全部読んでから選ぶ',when:'今回から'},{txt:'「本当にそうか？」と自問する',when:'今回から'},{txt:'答えの根拠を1文で言えるか確認',when:'次回から'}],
  time:[{txt:'解答前に「確認の間」を意識する',when:'今回から'},{txt:'最後に見直しの時間を必ず取る',when:'今回から'},{txt:'焦らず一問一問に集中する',when:'今回から'}],
};

const CAUSE_COLORS = {knowledge:'#2563eb',understanding:'#7c3aed',skip:'#d97706',calc:'#059669',careless:'#dc2626',time:'#6b7280'};

// ─────────────────────────────────────────
// DB (localStorage wrapper)
// ─────────────────────────────────────────
const DB_KEY = 'benkyonavi_v1';

function dbLoad() {
  try {
    const raw = localStorage.getItem(DB_KEY);
    if (!raw) return initDB();
    return JSON.parse(raw);
  } catch(e) { return initDB(); }
}

function initDB() {
  return {
    version: 1,
    createdAt: new Date().toISOString(),
    // qid -> {rank:'A'|'B'|'C', attemptCount, correctCount, lastAttempt}
    questions: {},
    // Array of records
    history: [],
    // qid -> [causeId]  (latest)
    latestCauses: {},
  };
}

function dbSave(db) {
  try {
    localStorage.setItem(DB_KEY, JSON.stringify(db));
  } catch(e) { alert('保存に失敗しました: ' + e.message); }
}

function dbGetQuestion(db, qid) {
  return db.questions[qid] || {rank:'C', attemptCount:0, correctCount:0, lastAttempt:null};
}

function dbAddAttempt(db, qid, isCorrect, causes, memo, actions, rank) {
  // update question summary
  const q = dbGetQuestion(db, qid);
  q.rank = rank;
  q.attemptCount = (q.attemptCount || 0) + 1;
  q.correctCount = (q.correctCount || 0) + (isCorrect ? 1 : 0);
  q.lastAttempt = new Date().toISOString();
  db.questions[qid] = q;

  // add history record
  db.history.push({
    id: Date.now(),
    qid,
    timestamp: new Date().toISOString(),
    isCorrect,
    causes,
    memo,
    actions,
    rank,
  });

  // update latest causes
  db.latestCauses[qid] = causes;

  dbSave(db);
}

// ─────────────────────────────────────────
// State
// ─────────────────────────────────────────
let db = dbLoad();
let cur = null, selAns = null, answered = null;
let causes = {}, memo = '', selectedActions = {};

// ─────────────────────────────────────────
// Helpers
// ─────────────────────────────────────────
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function trunc(s,n){return s.length>n?s.slice(0,n)+'…':s}
function fmtDate(iso){
  if(!iso) return '-';
  const d = new Date(iso);
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function fmtDateFull(iso){
  if(!iso) return '-';
  const d = new Date(iso);
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function sortedQ() {
  const ORDER = {C:0, B:1, A:2};
  return [...QS].sort((a,b) => {
    const ra = db.questions[a.id]?.rank ?? 'C';
    const rb = db.questions[b.id]?.rank ?? 'C';
    return (ORDER[ra]??3) - (ORDER[rb]??3);
  });
}

function doneCount() { return Object.keys(db.questions).length; }

// ─────────────────────────────────────────
// Tab
// ─────────────────────────────────────────
function showTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  document.getElementById('view-'+name).classList.add('active');
  if(name==='history') renderHistory();
  if(name==='stats') renderStats();
  if(name==='db') renderDB();
}

// ─────────────────────────────────────────
// P1 — 問題一覧
// ─────────────────────────────────────────
function renderP1() {
  const qs = sortedQ();
  document.getElementById('p1').innerHTML = qs.map(q => {
    const qd = db.questions[q.id];
    const rank = qd?.rank;
    const bdg = rank ? `<span class="qbdg bdg-${rank}">${rank}</span>` : `<span class="qbdg bdg-N">未</span>`;
    const latestCauses = db.latestCauses[q.id] ?? [];
    const causeStr = latestCauses.length ? latestCauses.map(c => CAUSES.find(x=>x.id===c)?.label).join('・') : '';
    const lastTime = qd?.lastAttempt ? `前回 ${fmtDate(qd.lastAttempt)}` : '';
    const prev = [lastTime, causeStr].filter(Boolean).join('　');
    return `<div class="qrow${cur===q.id?' active':''}" onclick="handleSel(${q.id})">
      <div class="qrow-top"><span class="qnum">Q${q.id+1}</span><span class="qtxt">${esc(trunc(q.text,28))}</span>${bdg}</div>
      ${prev?`<div class="qprev">${esc(prev)}</div>`:''}
    </div>`;
  }).join('');

  const d = doneCount(), t = QS.length;
  document.getElementById('prog-fill').style.width = `${Math.round(d/t*100)}%`;
  document.getElementById('prog-lbl').textContent = `${d}/${t}問`;
  document.getElementById('ph-prog').textContent = `${d}/${t}問完了`;
}

// ─────────────────────────────────────────
// P2 — 問題・解答
// ─────────────────────────────────────────
function renderP2() {
  if(cur === null) {
    document.getElementById('p2-name').textContent = '問題と解答';
    document.getElementById('p2').innerHTML = '<div class="locked"><div class="lock-ico">←</div>問題を選んでください</div>';
    return;
  }
  const q = QS[cur];
  document.getElementById('p2-name').textContent = `Q${q.id+1} ${q.principle}`;
  const done = answered !== null;
  let choHtml = '';
  if(q.type === 'ox') {
    const okCls = done ? (q.answer===true ? ' sel-ok' : ' sel-ng') : (selAns===true ? ' sel-ok' : '');
    const ngCls = done ? (q.answer===false ? ' sel-ok' : (selAns===false ? ' sel-ng' : '')) : (selAns===false ? ' sel-ng' : '');
    choHtml = `<div class="ox-row">
      <button class="ox-btn${selAns===true||done?okCls:''}" ${done?'disabled':''} onclick="pickOX(true)">○</button>
      <button class="ox-btn${selAns===false||done?ngCls:''}" ${done?'disabled':''} onclick="pickOX(false)">×</button>
    </div>`;
  } else {
    choHtml = q.choices.map((c,i) => {
      let cls = 'ch-btn';
      if(done){ if(i===q.answer) cls+=' ok'; else if(i===selAns&&selAns!==q.answer) cls+=' ng'; }
      else if(selAns===i) cls+=' sel';
      return `<button class="${cls}" ${done?'disabled':''} onclick="pickSel(${i})">${String.fromCharCode(65+i)}. ${esc(c)}</button>`;
    }).join('');
  }
  const resHtml = done
    ? `<div class="res-box ${answered?'res-ok':'res-ng'}">${answered?'✓ 正解！':'✗ 不正解'}</div>
       <div class="explain-box"><div class="explain-lbl">解説</div><div class="explain-txt">${esc(q.explain)}</div></div>
       <div class="explain-box" style="border-left:2px solid var(--blue)"><div class="explain-lbl">ポイント</div><div class="explain-txt">${esc(q.point)}</div></div>`
    : `<button class="dbtn primary" ${selAns===null?'disabled':''} onclick="handleSubmit()">解答する</button>`;
  document.getElementById('p2').innerHTML = `<div class="qtext">${esc(q.text)}</div>${choHtml}${resHtml}`;
}

// ─────────────────────────────────────────
// P3 — 原因分析
// ─────────────────────────────────────────
function renderP3() {
  if(answered === null) {
    document.getElementById('p3').innerHTML = '<div class="locked"><div class="lock-ico">🔒</div>解答後に入力できます</div>';
    return;
  }
  const causeHtml = CAUSES.map(c => `
    <div class="cause-item${causes[c.id]?' sel':''}" onclick="toggleCause('${c.id}')">
      <div class="cause-ico">${c.ico}</div>
      <div><div class="cause-lbl">${c.label}</div><div class="cause-sub">${c.sub}</div></div>
    </div>`).join('');

  // 過去履歴（この問題だけ）
  const hist = db.history.filter(h=>h.qid===cur).slice(-5).reverse();
  const histHtml = hist.length ? `
    <div style="height:1px;background:var(--border);margin:10px 0"></div>
    <div class="slbl">この問題の過去記録</div>
    ${hist.map(h=>`<div class="hist-item">
      <div class="hist-date">${fmtDateFull(h.timestamp)} — <span class="qbdg bdg-${h.rank}">${h.rank}</span> ${h.isCorrect?'✓':'✗'}</div>
      ${h.causes.length ? h.causes.map(c=>CAUSES.find(x=>x.id===c)?.label).join('・') : '原因なし'}
      ${h.memo?`<div style="color:var(--muted);margin-top:2px;font-style:italic">${esc(h.memo)}</div>`:''}
    </div>`).join('')}` : '';

  document.getElementById('p3').innerHTML = `
    <div class="slbl">間違えた原因（複数可）</div>
    ${causeHtml}
    <div class="slbl">メモ（任意）</div>
    <textarea class="memo-ta" rows="2" placeholder="気づきをメモ…" oninput="memo=this.value">${esc(memo)}</textarea>
    ${histHtml}`;
}

// ─────────────────────────────────────────
// P4 — 改善計画
// ─────────────────────────────────────────
function renderP4() {
  const hasCause = Object.values(causes).some(Boolean);
  if(answered === null || !hasCause) {
    document.getElementById('p4').innerHTML = `<div class="locked"><div class="lock-ico">🔒</div>${answered===null?'解答後に入力できます':'原因を1つ以上選択してください'}</div>`;
    return;
  }
  const q = QS[cur];
  const qd = dbGetQuestion(db, cur);
  const rank = qd.rank || 'C';
  const selCauses = CAUSES.filter(c => causes[c.id]);
  const primary = selCauses[0];
  const proposal = primary ? (PROPOSALS[primary.id]?.[rank]??'').replace('{p}', q.principle) : '';
  const allActions = selCauses.flatMap(c => ACTIONS[c.id]??[]).filter((a,i,arr)=>arr.findIndex(x=>x.txt===a.txt)===i).slice(0,4);
  const actionHtml = allActions.map((a,i) => `
    <div class="action-item${selectedActions[i]?' sel':''}" onclick="toggleAction(${i})">
      <div class="action-cb">${selectedActions[i]?'✓':''}</div>
      <div class="action-txt">${esc(a.txt)}<div class="action-when">いつ：${a.when}</div></div>
    </div>`).join('');

  document.getElementById('p4').innerHTML = `
    <div class="ai-box">
      <div class="ai-hd"><div class="ai-ico">AI</div><div class="ai-title">改善提案</div></div>
      <div class="ai-txt">${esc(proposal)}</div>
    </div>
    <div class="slbl">実行するアクション</div>
    ${actionHtml}
    <div class="slbl">この問題の理解度</div>
    <div style="display:flex;gap:6px;margin-bottom:6px">
      ${['C','B','A'].map(r=>`<button onclick="setRank('${r}')" style="flex:1;padding:6px;border-radius:7px;border:1.5px solid ${rank===r?'var(--blue)':'var(--border)'};background:${rank===r?'var(--blue-l)':'var(--white)'};color:${rank===r?'var(--blue)':'var(--ink)'};font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">${r==='C'?'C 要復習':r==='B'?'B 復習推奨':'A 理解済'}</button>`).join('')}
    </div>
    <button class="save-btn" onclick="handleSave()">💾 記録を保存する</button>
    <div style="font-size:10px;color:var(--muted);text-align:center;margin-top:6px">保存するとDBに記録されます</div>`;
}

// ─────────────────────────────────────────
// Events
// ─────────────────────────────────────────
function handleSel(qid) {
  cur=qid; selAns=null; answered=null; causes={}; memo=''; selectedActions={};
  renderP1(); renderP2(); renderP3(); renderP4();
}
function pickOX(v) { if(answered!==null)return; selAns=v; renderP2(); }
function pickSel(i) { if(answered!==null)return; selAns=i; renderP2(); }
function handleSubmit() {
  if(cur===null||selAns===null)return;
  answered = (selAns===QS[cur].answer);
  // デフォルトランクをDBから引く（なければC）
  renderP2(); renderP3(); renderP4();
}
function toggleCause(cid) { causes[cid]=!causes[cid]; renderP3(); renderP4(); }
function toggleAction(i) { selectedActions[i]=!selectedActions[i]; renderP4(); }
function setRank(r) {
  if(cur===null)return;
  db.questions[cur] = {...dbGetQuestion(db,cur), rank:r};
  dbSave(db);
  renderP4();
}
function handleSave() {
  if(cur===null) return;
  const selCauseIds = Object.keys(causes).filter(k=>causes[k]);
  const selActionTxts = Object.keys(selectedActions).filter(k=>selectedActions[k]).map(i=>i);
  const rank = db.questions[cur]?.rank ?? 'C';
  dbAddAttempt(db, cur, answered, selCauseIds, memo, selActionTxts, rank);
  renderP1(); renderP3();
  // フィードバック
  const btn = document.querySelector('.save-btn');
  if(btn){ btn.textContent='✓ 保存しました'; btn.style.background='#059669'; setTimeout(()=>renderP4(),1200); }
}

// HISTORY view
// ─────────────────────────────────────────

// ─────────────────────────────────────────
// STATS view
// ─────────────────────────────────────────
function renderStats() {
  const hist = db.history;
  const total = hist.length;
  const correct = hist.filter(h=>h.isCorrect).length;
  const rate = total ? Math.round(correct/total*100) : 0;
  const aCount = Object.values(db.questions).filter(q=>q.rank==='A').length;
  const streak = calcStreak();

  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-lbl">総解答数</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--blue)">${rate}%</div><div class="stat-lbl">正答率</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--green)">${aCount}</div><div class="stat-lbl">A理解済</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--amber)">${streak}</div><div class="stat-lbl">連続日数</div></div>`;

  // 原因分布
  const causeCounts = {};
  CAUSES.forEach(c=>causeCounts[c.id]=0);
  hist.forEach(h=>h.causes.forEach(c=>{if(causeCounts[c]!==undefined)causeCounts[c]++;}));
  const maxC = Math.max(...Object.values(causeCounts), 1);
  document.getElementById('cause-chart').innerHTML = `
    <div class="chart-title">失敗原因の分布</div>
    ${CAUSES.map(c=>`<div class="bar-row">
      <div class="bar-lbl">${c.ico} ${c.label}</div>
      <div class="bar-bg"><div class="bar-fill" style="width:${Math.round(causeCounts[c.id]/maxC*100)}%;background:${CAUSE_COLORS[c.id]}"></div></div>
      <div class="bar-val">${causeCounts[c.id]}</div>
    </div>`).join('')}`;

  // 問題別スコア
  const maxAttempt = Math.max(...QS.map(q=>db.questions[q.id]?.attemptCount??0), 1);
  document.getElementById('score-chart').innerHTML = `
    <div class="chart-title">問題別 正答率・挑戦回数</div>
    ${QS.map(q=>{
      const qd = db.questions[q.id];
      if(!qd) return `<div class="bar-row"><div class="bar-lbl" style="font-size:10px">Q${q.id+1}</div><div class="bar-bg"><div class="bar-fill" style="width:0;background:var(--border)"></div></div><div class="bar-val">-</div></div>`;
      const r = qd.correctCount/qd.attemptCount;
      const pct = Math.round(r*100);
      const col = pct>=80?'var(--green)':pct>=50?'var(--amber)':'var(--red)';
      return `<div class="bar-row">
        <div class="bar-lbl" style="font-size:10px">Q${q.id+1} <span class="qbdg bdg-${qd.rank}">${qd.rank}</span></div>
        <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${col}"></div></div>
        <div class="bar-val">${pct}%</div>
      </div>`;
    }).join('')}`;
}

function calcStreak() {
  const days = new Set(db.history.map(h=>{
    const d=new Date(h.timestamp);
    return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
  }));
  let streak=0;
  const now=new Date();
  for(let i=0;i<365;i++){
    const d=new Date(now);
    d.setDate(d.getDate()-i);
    const key=`${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
    if(days.has(key)) streak++;
    else if(i>0) break;
  }
  return streak;
}

// DB view
// ─────────────────────────────────────────
function renderDB() {
  const raw = localStorage.getItem(DB_KEY) || '{}';
  const size = new Blob([raw]).size;
  const tables = [
    {key:'questions', label:'questions テーブル', desc:`問題ごとの理解度・回数 (${Object.keys(db.questions).length}件)`},

    {key:'latestCauses', label:'latestCauses テーブル', desc:`最新の原因記録 (${Object.keys(db.latestCauses).length}件)`},

  document.getElementById('db-content').innerHTML = `
    <div class="db-section">
      <div class="db-section-title">ストレージ情報 <span class="db-tag">localStorage</span></div>
      <div class="db-row"><span class="db-key">キー</span><span class="db-val">${DB_KEY}</span></div>
      <div class="db-row"><span class="db-key">データサイズ</span><span class="db-val">${size.toLocaleString()} bytes</span></div>
      <div class="db-row"><span class="db-key">作成日時</span><span class="db-val">${fmtDateFull(db.createdAt)}</span></div>
      <div class="db-row"><span class="db-key">バージョン</span><span class="db-val">v${db.version}</span></div>
    </div>

    ${tables.map(t=>`<div class="db-section">
      <div class="db-section-title">${t.label} <span class="db-tag">${t.desc}</span></div>
      <pre class="json-view">${esc(JSON.stringify(db[t.key], null, 2))}</pre>
    </div>`).join('')}

    <div class="db-section">
      <div class="db-section-title">操作</div>
      <div class="export-row">
        <button class="export-btn" onclick="exportData()">📤 JSONエクスポート</button>
        <button class="export-btn" onclick="copyToClipboard()">📋 クリップボードにコピー</button>
      </div>
      <div class="import-area">
        <div class="slbl">JSONインポート（貼り付け後に読み込むボタンを押す）</div>
        <textarea class="import-ta" rows="4" id="import-ta" placeholder='{"version":1,"history":[...],...}'></textarea>
        <div class="export-row" style="margin-top:6px">
          <button class="export-btn" onclick="importData()">📥 読み込む</button>
          <button class="export-btn" style="color:var(--red)" onclick="confirmReset()">🗑 全データ削除</button>
        </div>
      </div>
    </div>`;
}

function exportData() {
  const json = JSON.stringify(db, null, 2);
  const blob = new Blob([json], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `benkyonavi_${new Date().toISOString().slice(0,10)}.json`;
  a.click(); URL.revokeObjectURL(url);
}

function copyToClipboard() {
  const json = JSON.stringify(db, null, 2);
  navigator.clipboard.writeText(json).then(()=>alert('クリップボードにコピーしました')).catch(()=>alert('コピーに失敗しました'));
}

function importData() {
  const ta = document.getElementById('import-ta');
  try {
    const parsed = JSON.parse(ta.value);
    if(!parsed.version || !Array.isArray(parsed.history)) throw new Error('フォーマットが正しくありません');
    db = parsed;
    dbSave(db);
    alert('インポートしました');
    renderDB(); renderP1();
  } catch(e) { alert('エラー: ' + e.message); }
}

function confirmReset() {
  if(confirm('すべての学習データを削除しますか？\nこの操作は取り消せません。')) {
    localStorage.removeItem(DB_KEY);
    db = initDB();
    dbSave(db);
    cur=null; selAns=null; answered=null; causes={}; memo=''; selectedActions={};
    renderAll();
    alert('リセットしました');
  }
}

// ─────────────────────────────────────────
// Init
// ─────────────────────────────────────────
function renderAll() { renderP1(); renderP2(); renderP3(); renderP4(); }
renderAll();
</script>
</body>
</html>
